openapi: 3.1.0
info:
  title: DR Agent API (v1)
  version: 1.0.0
  summary: Contract-first API for bridge and ICM tracking endpoints.
servers:
  - url: http://127.0.0.1:8000
security:
  - apiKeyAuth: []
paths:
  /v1/bridge/transfers:
    post:
      summary: Create bridge transfer (idempotent)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BridgeTransferCreateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeTransfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/bridge/transfers/pending:
    get:
      summary: List pending bridge transfers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BridgeTransfer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/bridge/transfers/{transfer_id}/source-submitted:
    post:
      summary: Mark bridge transfer source submitted
      parameters:
        - $ref: '#/components/parameters/TransferId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BridgeSourceSubmittedRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeTransfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/bridge/transfers/{transfer_id}/send-tokens:
    post:
      summary: Send bridge tokens (source submit + tx)
      parameters:
        - $ref: '#/components/parameters/TransferId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BridgeSendTokensRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeTransfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
  /v1/bridge/transfers/{transfer_id}/source-confirmed:
    post:
      summary: Mark bridge transfer source confirmed
      parameters:
        - $ref: '#/components/parameters/TransferId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeTransfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/bridge/transfers/{transfer_id}/dest-submitted:
    post:
      summary: Mark bridge transfer destination submitted
      parameters:
        - $ref: '#/components/parameters/TransferId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BridgeDestSubmittedRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeTransfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/bridge/transfers/{transfer_id}/receive-tokens:
    post:
      summary: Receive bridge tokens (dest submit + tx)
      parameters:
        - $ref: '#/components/parameters/TransferId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BridgeReceiveTokensRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeTransfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
  /v1/bridge/transfers/{transfer_id}/completed:
    post:
      summary: Mark bridge transfer completed
      parameters:
        - $ref: '#/components/parameters/TransferId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeTransfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/bridge/transfers/{transfer_id}:
    get:
      summary: Get bridge transfer by id
      parameters:
        - $ref: '#/components/parameters/TransferId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeTransfer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/icm/messages:
    post:
      summary: Create ICM message (idempotent)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ICMMessageCreateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ICMMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/icm/messages/pending:
    get:
      summary: List pending ICM messages
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ICMMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/icm/messages/{message_id}/sent:
    post:
      summary: Mark ICM message sent
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ICMSentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ICMMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/icm/messages/{message_id}/delivered:
    post:
      summary: Mark ICM message delivered
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ICMDeliveredRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ICMMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/icm/messages/{message_id}/relay:
    post:
      summary: Relay ICM message onchain
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ICMMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
  /v1/icm/messages/{message_id}/processed:
    post:
      summary: Mark ICM message processed
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ICMMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/icm/messages/{message_id}/process-onchain:
    post:
      summary: Mark ICM message processed onchain
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ICMProcessOnchainRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ICMMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
  /v1/icm/messages/{message_id}/failed:
    post:
      summary: Mark ICM message failed
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ICMFailedRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ICMMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/icm/messages/{message_id}:
    get:
      summary: Get ICM message by id
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ICMMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
    TransferId:
      name: transfer_id
      in: path
      required: true
      schema:
        type: string
    MessageId:
      name: message_id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadGateway:
      description: Bad Gateway
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    BridgeTransferCreateRequest:
      type: object
      properties:
        sender:
          type: string
        amount_wei:
          type: string
        direction:
          type: string
          enum: [home_to_remote, remote_to_home]
      required: [sender, amount_wei, direction]
    BridgeSourceSubmittedRequest:
      type: object
      properties:
        source_tx_hash:
          type: string
      required: [source_tx_hash]
    BridgeDestSubmittedRequest:
      type: object
      properties:
        dest_tx_hash:
          type: string
      required: [dest_tx_hash]
    BridgeSendTokensRequest:
      type: object
      properties:
        amount_wei:
          type: string
      required: [amount_wei]
    BridgeReceiveTokensRequest:
      type: object
      properties:
        source_nonce:
          type: integer
        recipient:
          type: string
        amount_wei:
          type: string
        source_chain_id:
          type: string
      required: [source_nonce, recipient, amount_wei, source_chain_id]
    BridgeTransfer:
      type: object
      properties:
        transfer_id:
          type: string
        sender:
          type: string
        amount_wei:
          type: string
        direction:
          type: string
        status:
          type: string
        source_tx_hash:
          type: string
          nullable: true
        dest_tx_hash:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
      required:
        [transfer_id, sender, amount_wei, direction, status, created_at, updated_at]
    ICMMessageCreateRequest:
      type: object
      properties:
        source_chain:
          type: string
        dest_chain:
          type: string
        message_type:
          type: string
          enum: [bridge_transfer, settlement_sync, proof_attestation]
        sender:
          type: string
        payload:
          type: object
      required: [source_chain, dest_chain, message_type, sender, payload]
    ICMSentRequest:
      type: object
      properties:
        tx_hash:
          type: string
      required: [tx_hash]
    ICMDeliveredRequest:
      type: object
      properties:
        dest_tx_hash:
          type: string
      required: [dest_tx_hash]
    ICMFailedRequest:
      type: object
      properties:
        error:
          type: string
      required: [error]
    ICMProcessOnchainRequest:
      type: object
      properties:
        success:
          type: boolean
          default: true
    ICMMessage:
      type: object
      properties:
        message_id:
          type: string
        source_chain:
          type: string
        dest_chain:
          type: string
        message_type:
          type: string
        sender:
          type: string
        payload:
          type: object
        status:
          type: string
        source_tx_hash:
          type: string
          nullable: true
        dest_tx_hash:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
      required:
        [message_id, source_chain, dest_chain, message_type, sender, payload, status, created_at, updated_at]
    ErrorEnvelope:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
        retryable:
          type: boolean
        details:
          type: object
      required: [code, message, trace_id, retryable, details]
